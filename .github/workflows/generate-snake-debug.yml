name: Generate Snake Animation (debug)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate Snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: KarnailSingh87
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Show generated files (debug)
        run: |
          echo "DIST contents:"
          ls -la dist || true
          echo "Files sizes:"
          for f in dist/*; do echo "$(basename \"$f\") : $(stat -f%z \"$f\") bytes"; done || true
          echo "Head of first file:"
          head -n 5 dist/* || true

      - name: Show git branches and status (debug)
        run: |
          git --version
          git branch -avv || true
          git status --porcelain || true

      - name: Push generated files to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
